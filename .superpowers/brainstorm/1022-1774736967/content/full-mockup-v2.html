<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaspin Mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #130326 0%, #0b0b22 50%, #001428 100%);
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #d8c8f0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    text-align: center;
    padding: 18px;
    border-bottom: 1px solid #7a5aaa33;
    background: #08001488;
  }
  header h1 {
    font-size: 28px;
    letter-spacing: 6px;
    color: #d8c8f0;
    text-shadow: 0 0 20px #7a5aaa88;
    font-weight: 300;
  }
  header p { color: #7a5aaa; font-size: 11px; letter-spacing: 2px; margin-top: 3px; }

  .app {
    display: flex;
    flex: 1;
    height: calc(100vh - 70px);
    overflow: hidden;
  }

  /* LEFT — WHEEL AREA */
  .wheel-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 20px;
  }

  .wheel-wrapper {
    position: relative;
    width: 340px;
    height: 340px;
  }

  .wheel-pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 22px solid #7a5aaa;
    filter: drop-shadow(0 0 5px #7a5aaa88);
    z-index: 10;
  }

  .wheel-svg {
    width: 340px;
    height: 340px;
    filter: drop-shadow(0 0 18px #7a5aaa33);
  }

  .spin-btn {
    background: linear-gradient(135deg, #5e3a8c, #38206a);
    border: 2px solid #7a5aaa;
    color: #d8c8f0;
    font-size: 16px;
    letter-spacing: 4px;
    padding: 12px 48px;
    border-radius: 4px;
    cursor: pointer;
    box-shadow: 0 0 14px #7a5aaa44;
    text-transform: uppercase;
    font-weight: bold;
  }

  /* RESULT CARD */
  .result-card {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #130326ee, #0b0b22ee);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    backdrop-filter: blur(4px);
    z-index: 20;
    border-radius: 8px;
    padding: 20px;
  }
  .result-card .skin-name {
    font-size: 22px;
    letter-spacing: 4px;
    color: #d8c8f0;
    text-shadow: 0 0 12px #7a5aaa88;
    text-align: center;
    font-weight: 300;
    text-transform: uppercase;
  }
  .result-card img {
    width: 260px;
    border-radius: 6px;
    border: 2px solid #7a5aaa;
    box-shadow: 0 0 24px #7a5aaa44;
  }
  .result-card .spin-again {
    background: transparent;
    border: 1px solid #7a5aaa;
    color: #7a5aaa;
    padding: 8px 28px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 3px;
    text-transform: uppercase;
  }

  /* RIGHT — SIDEBAR */
  .sidebar {
    width: 220px;
    border-left: 1px solid #7a5aaa33;
    display: flex;
    flex-direction: column;
    background: #08001488;
  }
  .sidebar-header {
    padding: 12px 14px;
    border-bottom: 1px solid #7a5aaa33;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-header span {
    font-size: 10px;
    letter-spacing: 2px;
    color: #7a5aaa;
    text-transform: uppercase;
  }
  .sidebar-header .toggle-all {
    font-size: 9px;
    color: #5e4488;
    cursor: pointer;
    letter-spacing: 1px;
    background: none;
    border: none;
    text-transform: uppercase;
  }
  .skin-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .skin-list::-webkit-scrollbar { width: 4px; }
  .skin-list::-webkit-scrollbar-track { background: transparent; }
  .skin-list::-webkit-scrollbar-thumb { background: #7a5aaa33; border-radius: 2px; }

  .skin-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 7px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    background: #16003055;
  }
  .skin-item.active {
    border-color: #7a5aaa44;
    background: #241050aa;
    box-shadow: 0 0 5px #7a5aaa18;
  }
  .skin-item.inactive { opacity: 0.4; }

  .skin-thumb {
    width: 36px;
    height: 36px;
    border-radius: 3px;
    object-fit: cover;
    border: 1px solid #7a5aaa33;
    background: #130326;
    flex-shrink: 0;
  }
  .skin-info { flex: 1; min-width: 0; }
  .skin-info .name {
    font-size: 10px;
    color: #d8c8f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.5px;
  }
  .toggle-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #7a5aaa;
    flex-shrink: 0;
    box-shadow: 0 0 3px #7a5aaa88;
  }
  .skin-item.inactive .toggle-dot { background: #2e1a50; box-shadow: none; }
</style>
</head>
<body>

<header>
  <h1>YASPIN</h1>
  <p>THE UNFORGIVEN • SKIN SELECTOR</p>
</header>

<div class="app">
  <!-- WHEEL AREA -->
  <div class="wheel-area">
    <div class="wheel-wrapper">
      <div class="wheel-pointer"></div>
      <svg class="wheel-svg" viewBox="0 0 340 340">
        <g transform="translate(170,170)">
          <path d="M0,0 L0,-160 A160,160 0 0,1 113,-113 Z" fill="#241050" stroke="#7a5aaa" stroke-width="1.5"/>
          <path d="M0,0 L113,-113 A160,160 0 0,1 160,0 Z" fill="#130326" stroke="#7a5aaa" stroke-width="1.5"/>
          <path d="M0,0 L160,0 A160,160 0 0,1 113,113 Z" fill="#241050" stroke="#7a5aaa" stroke-width="1.5"/>
          <path d="M0,0 L113,113 A160,160 0 0,1 0,160 Z" fill="#130326" stroke="#7a5aaa" stroke-width="1.5"/>
          <path d="M0,0 L0,160 A160,160 0 0,1 -113,113 Z" fill="#241050" stroke="#7a5aaa" stroke-width="1.5"/>
          <path d="M0,0 L-113,113 A160,160 0 0,1 -160,0 Z" fill="#130326" stroke="#7a5aaa" stroke-width="1.5"/>
          <path d="M0,0 L-160,0 A160,160 0 0,1 -113,-113 Z" fill="#241050" stroke="#7a5aaa" stroke-width="1.5"/>
          <path d="M0,0 L-113,-113 A160,160 0 0,1 0,-160 Z" fill="#130326" stroke="#7a5aaa" stroke-width="1.5"/>
          <text transform="rotate(-67.5) translate(0,-105) rotate(67.5)" text-anchor="middle" fill="#d8c8f0" font-size="9" letter-spacing="0.5">High Noon</text>
          <text transform="rotate(-22.5) translate(0,-105) rotate(22.5)" text-anchor="middle" fill="#d8c8f0" font-size="9" letter-spacing="0.5">Nightbringer</text>
          <text transform="rotate(22.5) translate(0,-105) rotate(-22.5)" text-anchor="middle" fill="#d8c8f0" font-size="9" letter-spacing="0.5">Blood Moon</text>
          <text transform="rotate(67.5) translate(0,-105) rotate(-67.5)" text-anchor="middle" fill="#d8c8f0" font-size="9" letter-spacing="0.5">PROJECT</text>
          <text transform="rotate(112.5) translate(0,-105) rotate(-112.5)" text-anchor="middle" fill="#d8c8f0" font-size="9" letter-spacing="0.5">True Damage</text>
          <text transform="rotate(157.5) translate(0,-105) rotate(-157.5)" text-anchor="middle" fill="#d8c8f0" font-size="9" letter-spacing="0.5">Odyssey</text>
          <text transform="rotate(202.5) translate(0,-105) rotate(-202.5)" text-anchor="middle" fill="#d8c8f0" font-size="9" letter-spacing="0.5">Battle Academia</text>
          <text transform="rotate(247.5) translate(0,-105) rotate(-247.5)" text-anchor="middle" fill="#d8c8f0" font-size="9" letter-spacing="0.5">Conqueror</text>
          <circle r="30" fill="#08001a" stroke="#7a5aaa" stroke-width="2"/>
          <text text-anchor="middle" fill="#7a5aaa" font-size="9" dy="3" letter-spacing="1">YASUO</text>
        </g>
        <circle cx="170" cy="170" r="163" fill="none" stroke="#7a5aaa33" stroke-width="3"/>
      </svg>
    </div>
    <button class="spin-btn">SPIN</button>

    <!-- RESULT OVERLAY -->
    <div style="position:relative;width:340px">
      <div class="result-card" style="position:relative;padding:20px;gap:12px;border-radius:8px;border:1px solid #7a5aaa44">
        <div class="skin-name">HIGH NOON YASUO</div>
        <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Yasuo_1.jpg" alt="High Noon Yasuo" style="width:260px;border-radius:6px;border:2px solid #7a5aaa;box-shadow:0 0 24px #7a5aaa44"/>
        <button class="spin-again">SPIN AGAIN</button>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>My Skins</span>
      <button class="toggle-all">All / None</button>
    </div>
    <div class="skin-list">
      <div class="skin-item active">
        <img class="skin-thumb" src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Yasuo_0.jpg" alt=""/>
        <div class="skin-info"><div class="name">Default</div></div>
        <div class="toggle-dot"></div>
      </div>
      <div class="skin-item active">
        <img class="skin-thumb" src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Yasuo_1.jpg" alt=""/>
        <div class="skin-info"><div class="name">High Noon</div></div>
        <div class="toggle-dot"></div>
      </div>
      <div class="skin-item inactive">
        <img class="skin-thumb" src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Yasuo_2.jpg" alt=""/>
        <div class="skin-info"><div class="name">PROJECT</div></div>
        <div class="toggle-dot"></div>
      </div>
      <div class="skin-item active">
        <img class="skin-thumb" src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Yasuo_3.jpg" alt=""/>
        <div class="skin-info"><div class="name">Blood Moon</div></div>
        <div class="toggle-dot"></div>
      </div>
      <div class="skin-item inactive">
        <img class="skin-thumb" src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Yasuo_4.jpg" alt=""/>
        <div class="skin-info"><div class="name">Nightbringer</div></div>
        <div class="toggle-dot"></div>
      </div>
      <div class="skin-item active">
        <img class="skin-thumb" src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Yasuo_5.jpg" alt=""/>
        <div class="skin-info"><div class="name">True Damage</div></div>
        <div class="toggle-dot"></div>
      </div>
      <div class="skin-item inactive">
        <img class="skin-thumb" src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Yasuo_6.jpg" alt=""/>
        <div class="skin-info"><div class="name">Odyssey</div></div>
        <div class="toggle-dot"></div>
      </div>
      <div class="skin-item active">
        <img class="skin-thumb" src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Yasuo_7.jpg" alt=""/>
        <div class="skin-info"><div class="name">Battle Academia</div></div>
        <div class="toggle-dot"></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
