<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaspin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-start: #0d0118;
    --bg-mid:   #08081a;
    --bg-end:   #000d18;
    --panel:    #08001288;
    --border:   #6b4fa028;
    --border-md:#6b4fa044;
    --accent:   #6b4fa0;
    --glow:     #6b4fa055;
    --text:     #ddd0f5;
    --text-dim: #6b4fa0;
    --seg1:     #1a0b38;
    --seg2:     #0d0118;
    --hub:      #060010;
    --btn1:     #4a2878;
    --btn2:     #2a1050;
  }

  body {
    background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
    height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
    position: relative;
  }
  .header-title { text-align: center; }
  header h1 {
    font-size: 22px;
    letter-spacing: 8px;
    color: var(--text);
    font-weight: 300;
  }
  header p {
    color: var(--text-dim);
    font-size: 9px;
    letter-spacing: 3px;
    margin-top: 2px;
    text-transform: uppercase;
  }

  /* Settings gear — top-right of header */
  #settings-btn {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: 1px solid var(--border-md);
    border-radius: 6px;
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  #settings-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  #settings-btn svg { display: block; }

  /* Theme panel */
  #theme-panel {
    position: absolute;
    top: calc(100% + 6px);
    right: 12px;
    background: linear-gradient(135deg, var(--bg-start), var(--bg-mid));
    border: 1px solid var(--border-md);
    border-radius: 8px;
    padding: 14px;
    z-index: 100;
    min-width: 200px;
    box-shadow: 0 8px 32px #00000066;
    display: none;
  }
  #theme-panel.open { display: block; }
  #theme-panel h3 {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .theme-options { display: flex; flex-direction: column; gap: 4px; }
  .theme-opt {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 5px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .theme-opt:hover { background: #ffffff0a; border-color: var(--border-md); }
  .theme-opt.active { border-color: var(--accent); background: #ffffff08; }
  .theme-swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .theme-opt span {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text);
  }

  /* ── MAIN LAYOUT ── */
  .app {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── WHEEL PANEL ── */
  .wheel-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 16px;
    position: relative;
    min-width: 0;
  }

  .wheel-wrapper {
    position: relative;
    width: min(58vh, calc(100vw - 280px));
    height: min(58vh, calc(100vw - 280px));
  }

  .wheel-pointer {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-top: 18px solid var(--accent);
    z-index: 10;
    opacity: 0.9;
  }

  #wheel-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 2px 20px #00000055);
    transition: transform 0s;
  }

  /* Preview panel */
  #skin-preview {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 220px;
    height: 52px;
    flex-shrink: 0;
  }
  #preview-thumb {
    width: 30px;
    height: 42px;
    object-fit: cover;
    border-radius: 3px;
    border: 1px solid var(--border-md);
    background: var(--seg2);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #preview-thumb.loaded { opacity: 1; }
  #preview-name {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #preview-name.active { color: var(--text); }

  /* Spin button */
  #spin-btn {
    background: linear-gradient(135deg, var(--btn1), var(--btn2));
    border: 1px solid var(--border-md);
    color: var(--text);
    font-size: 13px;
    letter-spacing: 5px;
    padding: 11px 52px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 500;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #spin-btn:not(:disabled):hover {
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--glow);
  }
  #spin-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .no-skins-msg {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    display: none;
  }

  /* ── RESULT CARD ── */
  #result-card {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--bg-start)f0, var(--bg-mid)f0);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    backdrop-filter: blur(8px);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #result-card.visible { opacity: 1; pointer-events: all; }
  #result-skin-name {
    font-size: 18px;
    letter-spacing: 5px;
    color: var(--text);
    text-align: center;
    font-weight: 300;
    text-transform: uppercase;
  }
  #result-splash {
    width: 260px;
    border-radius: 6px;
    border: 1px solid var(--border-md);
    box-shadow: 0 4px 32px #00000066;
  }
  #spin-again-btn {
    background: transparent;
    border: 1px solid var(--border-md);
    color: var(--text-dim);
    padding: 8px 28px;
    font-size: 10px;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 3px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  #spin-again-btn:hover { border-color: var(--accent); color: var(--text); }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 210px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--panel);
    flex-shrink: 0;
    min-height: 0;
  }
  .sidebar-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .sidebar-header span {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  #toggle-all-btn {
    font-size: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    background: none;
    border: none;
    text-transform: uppercase;
    color: var(--text-dim);
    transition: color 0.15s;
  }
  #toggle-all-btn:hover { color: var(--text); }

  #skin-list {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    padding: 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .skin-item {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 8px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s;
    background: transparent;
    user-select: none;
    overflow: hidden;
  }
  .skin-item.active { border-color: var(--border); background: #ffffff06; }
  .skin-item.inactive { opacity: 0.38; }
  .skin-item:hover { background: #ffffff08; border-color: var(--border-md); }

  .skin-thumb {
    width: 24px;
    height: 24px;
    border-radius: 3px;
    object-fit: cover;
    border: 1px solid var(--border);
    background: var(--seg2);
    flex-shrink: 0;
  }
  .skin-label {
    flex: 1;
    font-size: 9px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.3px;
    min-width: 0;
  }
  .toggle-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    transition: all 0.12s;
  }
  .skin-item.inactive .toggle-dot { background: var(--border-md); }

  #wheel-roulette-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-height: 0;
  }

  /* ── MODE TABS ── */
  #mode-tabs {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .mode-tab {
    background: none;
    border: 1px solid var(--border-md);
    color: var(--text-dim);
    font-size: 9px;
    letter-spacing: 2px;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .mode-tab:hover { border-color: var(--border-md); color: var(--text); }
  .mode-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .mode-tab:disabled { opacity: 0.35; cursor: not-allowed; }
  /* ── ROULETTE 3D ── */
  #wheel-roulette-panel.roulette-active {
    perspective: 500px;
    perspective-origin: 50% 5%;
  }
  #wheel-roulette-panel.roulette-active .wheel-wrapper {
    transform: rotateX(52deg);
  }
  #wheel-roulette-panel.roulette-active .wheel-pointer {
    /* pointer floats above the tilted wheel — keep it flat */
    transform: translateX(-50%) rotateX(-52deg);
  }
  #roulette-ball {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--text);
    box-shadow: 0 0 6px var(--glow), 0 0 2px #fff;
    top: 50%;
    left: 50%;
    margin: -5px 0 0 -5px;
    transform-origin: 5px 5px;
    display: none;
    z-index: 5;
    pointer-events: none;
  }
  @keyframes rouletteOrbit {
    from { transform: rotate(0deg) translateX(var(--orbit-r)) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(var(--orbit-r)) rotate(-360deg); }
  }

  /* ── PLINKO ── */
  #plinko-panel {
    align-items: center;
    justify-content: center;
    flex: 1;
    min-height: 0;
  }
  #plinko-svg {
    max-height: 100%;
    max-width: 100%;
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>YASPIN</h1>
    <p>The Unforgiven · Skin Selector</p>
  </div>
  <button id="settings-btn" title="Change theme">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
  <div id="theme-panel">
    <h3>Theme</h3>
    <div class="theme-options" id="theme-options"></div>
  </div>
</header>

<div class="app">
  <div class="wheel-panel">
    <div id="mode-tabs">
      <button class="mode-tab active" data-mode="wheel">Wheel</button>
      <button class="mode-tab" data-mode="roulette">Roulette</button>
      <button class="mode-tab" data-mode="plinko">Plinko</button>
    </div>
    <div id="wheel-roulette-panel">
      <div class="wheel-wrapper">
        <div class="wheel-pointer"></div>
        <svg id="wheel-svg" viewBox="0 0 360 360"></svg>
        <div id="roulette-ball"></div>
      </div>
    </div>
    <div id="plinko-panel" style="display:none; width:100%;">
      <svg id="plinko-svg" viewBox="0 0 300 500" width="100%" height="100%"
           style="display:block;"></svg>
    </div>
    <div id="skin-preview">
      <img id="preview-thumb" alt="" />
      <span id="preview-name">Hover a segment</span>
    </div>
    <button id="spin-btn">SPIN</button>
    <span class="no-skins-msg" id="no-skins-msg">Select at least one skin</span>

    <div id="result-card">
      <div id="result-skin-name"></div>
      <img id="result-splash" alt=""/>
      <button id="spin-again-btn">Spin Again</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span>Skins</span>
      <button id="toggle-all-btn">All / None</button>
    </div>
    <div id="skin-list"></div>
  </div>
</div>

<script>
  // ── THEMES ──
  const THEMES = {
    void: {
      name: 'Void', swatch: '#6b4fa0',
      vars: { '--bg-start':'#0d0118','--bg-mid':'#08081a','--bg-end':'#000d18',
               '--panel':'#08001288','--border':'#6b4fa028','--border-md':'#6b4fa044',
               '--accent':'#6b4fa0','--glow':'#6b4fa044','--text':'#ddd0f5',
               '--text-dim':'#6b4fa0','--seg1':'#1a0b38','--seg2':'#0d0118',
               '--hub':'#060010','--btn1':'#4a2878','--btn2':'#2a1050' },
    },
    bloodmoon: {
      name: 'Blood Moon', swatch: '#c02040',
      vars: { '--bg-start':'#110005','--bg-mid':'#0d0208','--bg-end':'#0a0005',
               '--panel':'#0d000588','--border':'#c0204028','--border-md':'#c0204044',
               '--accent':'#c02040','--glow':'#c0204044','--text':'#f5d0d8',
               '--text-dim':'#c02040','--seg1':'#2a0510','--seg2':'#110005',
               '--hub':'#080003','--btn1':'#7a1428','--btn2':'#3a0810' },
    },
    highnoon: {
      name: 'High Noon', swatch: '#c8922a',
      vars: { '--bg-start':'#100d00','--bg-mid':'#0c0a02','--bg-end':'#0a0800',
               '--panel':'#0d0a0088','--border':'#c8922a28','--border-md':'#c8922a44',
               '--accent':'#c8922a','--glow':'#c8922a44','--text':'#f5e8c0',
               '--text-dim':'#c8922a','--seg1':'#2a1e06','--seg2':'#100d00',
               '--hub':'#080600','--btn1':'#7a5818','--btn2':'#3a2808' },
    },
    project: {
      name: 'PROJECT', swatch: '#00b4cc',
      vars: { '--bg-start':'#001518','--bg-mid':'#00080d','--bg-end':'#000c10',
               '--panel':'#00101488','--border':'#00b4cc28','--border-md':'#00b4cc44',
               '--accent':'#00b4cc','--glow':'#00b4cc44','--text':'#c0f0f8',
               '--text-dim':'#00b4cc','--seg1':'#041e24','--seg2':'#001518',
               '--hub':'#000b0e','--btn1':'#007888','--btn2':'#003840' },
    },
    spiritblossom: {
      name: 'Spirit Blossom', swatch: '#cc4a8a',
      vars: { '--bg-start':'#100414','--bg-mid':'#0a020e','--bg-end':'#0d0010',
               '--panel':'#0d001488','--border':'#cc4a8a28','--border-md':'#cc4a8a44',
               '--accent':'#cc4a8a','--glow':'#cc4a8a44','--text':'#f5c8e8',
               '--text-dim':'#cc4a8a','--seg1':'#280a20','--seg2':'#100414',
               '--hub':'#080010','--btn1':'#882060','--btn2':'#440030' },
    },
    odyssey: {
      name: 'Odyssey', swatch: '#2255cc',
      vars: { '--bg-start':'#000d1c','--bg-mid':'#000810','--bg-end':'#000a14',
               '--panel':'#00081488','--border':'#2255cc28','--border-md':'#2255cc44',
               '--accent':'#2255cc','--glow':'#2255cc44','--text':'#c0d0f8',
               '--text-dim':'#2255cc','--seg1':'#060f2a','--seg2':'#000d1c',
               '--hub':'#00060f','--btn1':'#183888','--btn2':'#0c1c44' },
    },
  };

  let activeTheme = 'void';

  function applyTheme(key) {
    const theme = THEMES[key];
    if (!theme) return;
    activeTheme = key;
    const root = document.documentElement;
    for (const [k, v] of Object.entries(theme.vars)) root.style.setProperty(k, v);
    // Update active state in panel
    document.querySelectorAll('.theme-opt').forEach(el => {
      el.classList.toggle('active', el.dataset.theme === key);
    });
    // Re-render wheel with new colors
    renderWheel();
    if (activeMode === 'plinko') renderPlinko();
    // Persist
    try { localStorage.setItem('yaspin_theme', key); } catch(_) {}
  }

  // Build theme panel options
  const themeOptionsEl = document.getElementById('theme-options');
  for (const [key, theme] of Object.entries(THEMES)) {
    const opt = document.createElement('div');
    opt.className = 'theme-opt';
    opt.dataset.theme = key;
    opt.innerHTML = `<div class="theme-swatch" style="background:${theme.swatch}"></div><span>${theme.name}</span>`;
    opt.addEventListener('click', () => { applyTheme(key); });
    themeOptionsEl.appendChild(opt);
  }

  // Settings gear toggle
  const settingsBtn = document.getElementById('settings-btn');
  const themePanel  = document.getElementById('theme-panel');
  settingsBtn.addEventListener('click', e => {
    e.stopPropagation();
    themePanel.classList.toggle('open');
  });
  document.addEventListener('click', () => themePanel.classList.remove('open'));
  themePanel.addEventListener('click', e => e.stopPropagation());

  // Load saved theme preference (apply later, after DOM refs are ready)
  try {
    const saved = localStorage.getItem('yaspin_theme');
    if (saved && THEMES[saved]) activeTheme = saved;
  } catch(_) {}
  // Apply CSS vars immediately (no renderWheel yet — wheel DOM not ready)
  (function applyCssVarsOnly(key) {
    const theme = THEMES[key];
    if (!theme) return;
    const root = document.documentElement;
    for (const [k, v] of Object.entries(theme.vars)) root.style.setProperty(k, v);
    document.querySelectorAll('.theme-opt').forEach(el =>
      el.classList.toggle('active', el.dataset.theme === key));
  })(activeTheme);

  // ── MODE ──
  let activeMode = 'wheel';
  try { const m = localStorage.getItem('yaspin_mode'); if (m) activeMode = m; } catch(_) {}

  function setMode(mode) {
    activeMode = mode;
    try { localStorage.setItem('yaspin_mode', mode); } catch(_) {}

    document.querySelectorAll('.mode-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.mode === mode));

    document.getElementById('wheel-roulette-panel').style.display =
      mode === 'plinko' ? 'none' : 'flex';
    document.getElementById('plinko-panel').style.display =
      mode === 'plinko' ? 'flex' : 'none';

    if (mode === 'plinko') renderPlinko();
    else renderWheel();

    // Roulette tilt
    const wrPanel = document.getElementById('wheel-roulette-panel');
    wrPanel.classList.toggle('roulette-active', mode === 'roulette');
  }

  document.getElementById('mode-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.mode-tab');
    if (tab && !isSpinning) setMode(tab.dataset.mode);
  });

  // ── SKINS ──
  const SKINS = [
    { num: 0,  name: 'Default Yasuo' },
    { num: 1,  name: 'High Noon Yasuo' },
    { num: 2,  name: 'PROJECT: Yasuo' },
    { num: 3,  name: 'Blood Moon Yasuo' },
    { num: 9,  name: 'Nightbringer Yasuo' },
    { num: 10, name: 'Odyssey Yasuo' },
    { num: 17, name: 'Battle Boss Yasuo' },
    { num: 18, name: 'True Damage Yasuo' },
    { num: 35, name: 'Prestige True Damage Yasuo' },
    { num: 36, name: 'Spirit Blossom Yasuo' },
    { num: 45, name: 'Sea Dog Yasuo' },
    { num: 54, name: 'Truth Dragon Yasuo' },
    { num: 55, name: 'Dream Dragon Yasuo' },
    { num: 56, name: 'Inkshadow Yasuo' },
    { num: 57, name: 'Prestige Inkshadow Yasuo' },
    { num: 68, name: 'Foreseen Yasuo' },
    { num: 77, name: 'Battle Wolf Yasuo' },
    { num: 87, name: 'Genesis Nightbringer Yasuo' },
  ];

  const DDR      = 'https://ddragon.leagueoflegends.com/cdn/img/champion';
  const thumbUrl = num => `${DDR}/loading/Yasuo_${num}.jpg`;
  const splashUrl= num => `${DDR}/splash/Yasuo_${num}.jpg`;
  const LS_KEY   = 'yaspin_enabled_skins';

  function loadEnabled() {
    try { const r = localStorage.getItem(LS_KEY); if (r) return new Set(JSON.parse(r)); } catch(_) {}
    return new Set(SKINS.map(s => s.num));
  }
  function saveEnabled(s) {
    try { localStorage.setItem(LS_KEY, JSON.stringify([...s])); } catch(_) {}
  }

  let enabled = loadEnabled();
  let isSpinning = false;
  let currentRotation = 0;

  const skinList      = document.getElementById('skin-list');
  const spinBtn       = document.getElementById('spin-btn');
  const noSkinsMsg    = document.getElementById('no-skins-msg');
  const wheelSvg      = document.getElementById('wheel-svg');
  const resultCard    = document.getElementById('result-card');
  const resultSkinName= document.getElementById('result-skin-name');
  const resultSplash  = document.getElementById('result-splash');

  // ── SVG HELPERS ──
  const SVG_NS = 'http://www.w3.org/2000/svg';
  function svgEl(tag, attrs) {
    const el = document.createElementNS(SVG_NS, tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  function themeColor(varName) {
    return THEMES[activeTheme].vars[varName] || '#888';
  }

  function appendWheelDecor(svg, cx, cy, r, innerR) {
    svg.appendChild(svgEl('circle', { cx, cy, r: r + 2, fill: 'none', stroke: themeColor('--border'), 'stroke-width': '2' }));
    svg.appendChild(svgEl('circle', { cx, cy, r: innerR, fill: themeColor('--hub'), stroke: themeColor('--border-md'), 'stroke-width': '1.5' }));
    const t = svgEl('text', { x: cx, y: cy, 'text-anchor': 'middle', 'dominant-baseline': 'middle',
      fill: themeColor('--text-dim'), 'font-size': '7', 'letter-spacing': '1.5', 'font-family': 'Segoe UI, system-ui, sans-serif' });
    t.textContent = 'YASUO';
    svg.appendChild(t);
  }

  function renderSidebar() {
    skinList.innerHTML = '';
    SKINS.forEach(skin => {
      const isActive = enabled.has(skin.num);
      const item = document.createElement('div');
      item.className = 'skin-item ' + (isActive ? 'active' : 'inactive');
      item.dataset.num = skin.num;
      item.innerHTML = `
        <img class="skin-thumb" src="${thumbUrl(skin.num)}" alt="${skin.name}" loading="lazy"/>
        <span class="skin-label">${skin.name}</span>
        <div class="toggle-dot"></div>
      `;
      skinList.appendChild(item);
    });
  }

  skinList.addEventListener('click', e => {
    const item = e.target.closest('.skin-item');
    if (item) toggleSkin(+item.dataset.num);
  });

  function afterEnabledChange() {
    saveEnabled(enabled);
    renderSidebar();
    if (!isSpinning) renderWheel();
    if (!isSpinning && activeMode === 'plinko') renderPlinko();
    updateSpinBtn();
  }

  function toggleSkin(num) {
    if (enabled.has(num)) enabled.delete(num); else enabled.add(num);
    afterEnabledChange();
  }

  document.getElementById('toggle-all-btn').addEventListener('click', () => {
    if (enabled.size === SKINS.length) enabled.clear();
    else SKINS.forEach(s => enabled.add(s.num));
    afterEnabledChange();
  });

  function updateSpinBtn() {
    if (enabled.size === 0) {
      spinBtn.disabled = true;
      noSkinsMsg.style.display = 'block';
    } else {
      spinBtn.disabled = isSpinning;
      noSkinsMsg.style.display = 'none';
    }
  }

  function renderWheel() {
    const cx = 180, cy = 180, r = 160, innerR = 28;
    const activeSkins = SKINS.filter(s => enabled.has(s.num));
    wheelSvg.innerHTML = '';

    if (activeSkins.length === 0) {
      wheelSvg.appendChild(svgEl('circle', { cx, cy, r, fill: themeColor('--seg2'), stroke: themeColor('--border-md'), 'stroke-width': '1.5' }));
      appendWheelDecor(wheelSvg, cx, cy, r, innerR);
      return;
    }

    const segAngle = 360 / activeSkins.length;
    const br = r * 0.10; // badge radius

    const defs = svgEl('defs', {});
    wheelSvg.appendChild(defs);

    activeSkins.forEach((skin, i) => {
      const startAngle = i * segAngle - 90;
      const endAngle   = startAngle + segAngle;
      const startRad   = startAngle * Math.PI / 180;
      const endRad     = endAngle   * Math.PI / 180;

      const x1 = cx + r * Math.cos(startRad), y1 = cy + r * Math.sin(startRad);
      const x2 = cx + r * Math.cos(endRad),   y2 = cy + r * Math.sin(endRad);
      const largeArc = segAngle > 180 ? 1 : 0;

      wheelSvg.appendChild(svgEl('path', {
        d: activeSkins.length === 1
          ? `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx - 0.01} ${cy - r} Z`
          : `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`,
        fill: i % 2 === 0 ? themeColor('--seg1') : themeColor('--seg2'),
        stroke: themeColor('--border'),
        'stroke-width': '1',
      }));

      // Thumbnail badge
      const midAngle = (startAngle + segAngle / 2) * Math.PI / 180;
      const bx = cx + r * 0.68 * Math.cos(midAngle);
      const by = cy + r * 0.68 * Math.sin(midAngle);
      const clipId = `tc-${i}`;
      const cp = svgEl('clipPath', { id: clipId });
      cp.appendChild(svgEl('circle', { cx: bx, cy: by, r: br }));
      defs.appendChild(cp);

      wheelSvg.appendChild(svgEl('image', {
        href: thumbUrl(skin.num),
        x: bx - br, y: by - br * 2.5,
        width: br * 2, height: br * 5,
        'clip-path': `url(#${clipId})`,
        preserveAspectRatio: 'xMidYMin slice',
      }));

      wheelSvg.appendChild(svgEl('circle', {
        cx: bx, cy: by, r: br,
        fill: 'none', stroke: themeColor('--border-md'), 'stroke-width': '1',
      }));
    });

    appendWheelDecor(wheelSvg, cx, cy, r, innerR);
  }

  function renderPlinko() {
    const svg = document.getElementById('plinko-svg');
    svg.innerHTML = '';
    const activeSkins = SKINS.filter(s => enabled.has(s.num));
    if (!activeSkins.length) return;

    const W = 300, H = 500;
    const SLOT_H = 70;
    const PEG_ROWS = 8, PEG_COLS = 7;
    const pegStartY = 60, pegEndY = H - SLOT_H - 30;
    const pegSpacingY = (pegEndY - pegStartY) / (PEG_ROWS - 1);
    const pegSpacingX = W / (PEG_COLS + 1);
    const slotW = W / activeSkins.length;
    const acc = themeColor('--accent');
    const seg1 = themeColor('--seg1');
    const seg2 = themeColor('--seg2');
    const borderMd = themeColor('--border-md');
    const textColor = themeColor('--text');

    const SVG_NS = 'http://www.w3.org/2000/svg';
    function el(tag, attrs) {
      const e = document.createElementNS(SVG_NS, tag);
      for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
      return e;
    }

    // defs block first (clipPaths added below)
    const defs = document.createElementNS(SVG_NS, 'defs');
    svg.appendChild(defs);

    // Board background
    svg.appendChild(el('rect', { x:0, y:0, width:W, height:H, fill:seg2, rx:6 }));

    // Drop chute at top center
    svg.appendChild(el('rect', { x: W/2-10, y:4, width:20, height:16, rx:3,
      fill: seg1, stroke: acc, 'stroke-width':'1' }));
    // Arrow down
    const arrow = document.createElementNS(SVG_NS, 'polygon');
    arrow.setAttribute('points', `${W/2-5},20 ${W/2+5},20 ${W/2},28`);
    arrow.setAttribute('fill', acc);
    svg.appendChild(arrow);

    // Pegs (staggered)
    for (let row = 0; row < PEG_ROWS; row++) {
      const cols = row % 2 === 0 ? PEG_COLS : PEG_COLS - 1;
      const offsetX = row % 2 === 0 ? pegSpacingX : pegSpacingX * 1.5;
      const y = pegStartY + row * pegSpacingY;
      for (let col = 0; col < cols; col++) {
        const x = offsetX + col * pegSpacingX;
        svg.appendChild(el('circle', { cx: x, cy: y, r: 4,
          fill: acc, opacity: '0.85' }));
      }
    }

    // Slots at bottom
    const slotY = H - SLOT_H;
    activeSkins.forEach((skin, i) => {
      const x = i * slotW;
      const fill = i % 2 === 0 ? seg1 : seg2;
      svg.appendChild(el('rect', {
        id: `plinko-slot-${i}`,
        x, y: slotY, width: slotW, height: SLOT_H,
        fill, stroke: borderMd, 'stroke-width': '0.5', rx: 2,
      }));
      // Thumbnail clipped to slot
      const clipId = `pslot-clip-${i}`;
      const cp = el('clipPath', { id: clipId });
      cp.appendChild(el('rect', { x, y: slotY + 2, width: slotW, height: SLOT_H - 2, rx: 2 }));
      defs.appendChild(cp);
      svg.appendChild(el('image', {
        href: thumbUrl(skin.num),
        x, y: slotY + 2,
        width: slotW, height: SLOT_H - 2,
        preserveAspectRatio: 'xMidYMid slice',
        'clip-path': `url(#${clipId})`,
        opacity: '0.55',
      }));
    });

    // Plinko ball (hidden initially)
    svg.appendChild(el('circle', {
      id: 'plinko-ball',
      cx: W/2, cy: 20, r: 7,
      fill: textColor, opacity: '0.95',
      style: 'display:none',
    }));
  }

  function calcPlinkoPath(winnerIdx, numSlots) {
    const W = 300;
    const SLOT_H = 70;
    const PEG_ROWS = 8;
    const pegStartY = 60;
    const pegEndY = 500 - SLOT_H - 30;
    const pegSpacingY = (pegEndY - pegStartY) / (PEG_ROWS - 1);
    const slotW = W / numSlots;
    const winnerX = slotW * (winnerIdx + 0.5);
    const margin = slotW * 0.5;

    const waypoints = [];
    let x = W / 2;

    for (let row = 0; row < PEG_ROWS; row++) {
      const remaining = PEG_ROWS - 1 - row;
      const needed = winnerX - x;
      const bias = remaining > 0 ? needed / (remaining + 1) : needed;
      const jitter = (Math.random() - 0.5) * slotW * 0.8;
      x = Math.max(margin, Math.min(W - margin, x + bias + jitter));
      const y = pegStartY + row * pegSpacingY;
      waypoints.push({ x, y, pause: 150 });
    }

    // Final landing in slot
    waypoints.push({ x: winnerX, y: 500 - SLOT_H + 10, pause: 0 });
    return waypoints;
  }

  function runPlinko(winner) {
    const activeSkins = SKINS.filter(s => enabled.has(s.num));
    const winnerIdx = activeSkins.findIndex(s => s.num === winner.num);
    const numSlots = activeSkins.length;
    const W = 300;

    renderPlinko(); // ensure fresh board

    const svg = document.getElementById('plinko-svg');
    const ball = svg.querySelector('#plinko-ball');
    if (!ball) { isSpinning = false; updateSpinBtn(); return; }
    ball.style.display = '';

    const waypoints = calcPlinkoPath(winnerIdx, numSlots);
    let wpIdx = 0;

    function step() {
      if (wpIdx >= waypoints.length) {
        // Flash winning slot
        const slot = svg.querySelector(`#plinko-slot-${winnerIdx}`);
        if (slot) {
          slot.setAttribute('stroke', themeColor('--accent'));
          slot.setAttribute('stroke-width', '2');
          slot.setAttribute('fill', themeColor('--accent') + '44');
        }
        setTimeout(() => {
          ball.style.display = 'none';
          isSpinning = false;
          document.querySelectorAll('.mode-tab').forEach(t => t.disabled = false);
          showResult(winner);
        }, 400);
        return;
      }

      const wp = waypoints[wpIdx++];
      ball.setAttribute('cx', wp.x);
      ball.setAttribute('cy', wp.y);

      // Update preview to column the ball is over
      const colIdx = Math.max(0, Math.min(
        Math.floor(wp.x / (W / numSlots)),
        numSlots - 1
      ));
      updatePreview(activeSkins[colIdx]);

      setTimeout(step, wp.pause || 0);
    }

    step();
  }

  applyTheme(activeTheme);
  setMode(activeMode);
  renderSidebar();
  updateSpinBtn();

  // ── PREVIEW PANEL ──
  const previewThumb = document.getElementById('preview-thumb');
  const previewName  = document.getElementById('preview-name');

  function updatePreview(skin) {
    if (!skin) {
      previewName.textContent = 'Hover a segment';
      previewName.classList.remove('active');
      previewThumb.classList.remove('loaded');
      return;
    }
    previewThumb.src = thumbUrl(skin.num);
    previewThumb.onload = () => previewThumb.classList.add('loaded');
    previewName.textContent = skin.name;
    previewName.classList.add('active');
  }

  function angleToSkinIndex(angleDeg, skins) {
    const seg = 360 / skins.length;
    return Math.floor(((angleDeg + 90) % 360 + 360) % 360 / seg) % skins.length;
  }

  wheelSvg.addEventListener('mousemove', e => {
    if (isSpinning) return;
    const activeSkins = SKINS.filter(s => enabled.has(s.num));
    if (!activeSkins.length) return;
    const rect = wheelSvg.getBoundingClientRect();
    const dx = e.clientX - (rect.left + rect.width / 2);
    const dy = e.clientY - (rect.top  + rect.height / 2);
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < rect.width * 0.08 || dist > rect.width * 0.5) { updatePreview(null); return; }
    updatePreview(activeSkins[angleToSkinIndex(Math.atan2(dy, dx) * 180 / Math.PI - currentRotation, activeSkins)]);
  });

  wheelSvg.addEventListener('mouseleave', () => { if (!isSpinning) updatePreview(null); });

  // ── LIVE SPIN TRACKING ──
  let trackingRaf = null;

  function startSpinTracking(activeSkins) {
    function tick() {
      const m = window.getComputedStyle(wheelSvg).transform;
      const v = m.match(/matrix\(([^)]+)\)/);
      if (v) {
        const p = v[1].split(',').map(Number);
        const deg = Math.atan2(p[1], p[0]) * 180 / Math.PI;
        updatePreview(activeSkins[angleToSkinIndex(-90 - deg, activeSkins)]);
      }
      trackingRaf = requestAnimationFrame(tick);
    }
    trackingRaf = requestAnimationFrame(tick);
  }

  function stopSpinTracking() {
    if (trackingRaf) { cancelAnimationFrame(trackingRaf); trackingRaf = null; }
  }

  // ── ROULETTE BALL ──
  const rouletteBall = document.getElementById('roulette-ball');

  function startRouletteOrbit() {
    const r = Math.round(wheelSvg.getBoundingClientRect().width * 0.49);
    rouletteBall.style.setProperty('--orbit-r', `${r}px`);
    rouletteBall.style.display = 'block';
    rouletteBall.style.animation = 'none';
    void rouletteBall.offsetWidth;
    rouletteBall.style.animation =
      'rouletteOrbit 0.65s linear 0s 6 forwards, rouletteOrbit 1.7s ease-out 3.9s 1 forwards';
  }

  function stopRouletteOrbit() {
    rouletteBall.style.animation = 'none';
    rouletteBall.style.transition = 'transform 0.3s ease-in';
    rouletteBall.style.transform = 'rotate(0deg) translateX(calc(var(--orbit-r) * 0.4)) rotate(0deg)';
    setTimeout(() => {
      rouletteBall.style.display = 'none';
      rouletteBall.style.transition = '';
      rouletteBall.style.transform = '';
    }, 350);
  }

  // ── SPIN ──
  function spin() {
    if (isSpinning) return;
    const activeSkins = SKINS.filter(s => enabled.has(s.num));
    if (!activeSkins.length) return;

    isSpinning = true;
    spinBtn.disabled = true;
    document.querySelectorAll('.mode-tab').forEach(t => t.disabled = true);

    const winnerIdx = Math.floor(Math.random() * activeSkins.length);
    const winner    = activeSkins[winnerIdx];

    // ── PLINKO PATH ──
    if (activeMode === 'plinko') {
      runPlinko(winner);
      return;
    }

    const segAngle  = 360 / activeSkins.length;
    const winnerMid = winnerIdx * segAngle + segAngle / 2;
    const extraSpins= (5 + Math.floor(Math.random() * 3)) * 360;
    const toWinner  = ((360 - winnerMid - currentRotation % 360) + 360) % 360;
    const target    = currentRotation + extraSpins + toWinner;

    wheelSvg.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 1.0)';
    wheelSvg.style.transform  = `rotate(${target}deg)`;
    currentRotation = target;

    startSpinTracking(activeSkins);
    if (activeMode === 'roulette') startRouletteOrbit();

    wheelSvg.addEventListener('transitionend', () => {
      if (activeMode === 'roulette') stopRouletteOrbit();
      stopSpinTracking();
      isSpinning = false;
      document.querySelectorAll('.mode-tab').forEach(t => t.disabled = false);
      showResult(winner);
    }, { once: true });
  }

  spinBtn.addEventListener('click', spin);

  function showResult(skin) {
    resultSkinName.textContent = skin.name;
    resultSplash.src = splashUrl(skin.num);
    resultCard.classList.add('visible');
  }

  function hideResult() {
    resultCard.classList.remove('visible');
    document.querySelectorAll('.mode-tab').forEach(t => t.disabled = false);
    updateSpinBtn();
  }

  document.getElementById('spin-again-btn').addEventListener('click', hideResult);
</script>

</body>
</html>
