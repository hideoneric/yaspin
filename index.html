<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaspin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(135deg, #130326 0%, #0b0b22 50%, #001428 100%);
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #d8c8f0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    text-align: center;
    padding: 18px;
    border-bottom: 1px solid #7a5aaa33;
    background: #08001488;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 28px;
    letter-spacing: 6px;
    color: #d8c8f0;
    text-shadow: 0 0 20px #7a5aaa88;
    font-weight: 300;
  }
  header p { color: #7a5aaa; font-size: 11px; letter-spacing: 2px; margin-top: 3px; }

  .app {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── WHEEL PANEL ── */
  .wheel-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 20px;
    position: relative;
  }

  .wheel-wrapper {
    position: relative;
    width: 360px;
    height: 360px;
  }

  .wheel-pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 22px solid #7a5aaa;
    filter: drop-shadow(0 0 5px #7a5aaa88);
    z-index: 10;
  }

  #wheel-svg {
    width: 360px;
    height: 360px;
    filter: drop-shadow(0 0 18px #7a5aaa33);
    transition: transform 0s;
  }

  #spin-btn {
    background: linear-gradient(135deg, #5e3a8c, #38206a);
    border: 2px solid #7a5aaa;
    color: #d8c8f0;
    font-size: 16px;
    letter-spacing: 4px;
    padding: 12px 48px;
    border-radius: 4px;
    cursor: pointer;
    box-shadow: 0 0 14px #7a5aaa44;
    text-transform: uppercase;
    font-weight: bold;
  }
  #spin-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none;
  }

  .no-skins-msg {
    font-size: 12px;
    color: #7a5aaa;
    letter-spacing: 1px;
    display: none;
  }

  /* ── RESULT CARD ── */
  #result-card {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #130326f0, #0b0b22f0);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    backdrop-filter: blur(6px);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #result-card.visible {
    opacity: 1;
    pointer-events: all;
  }
  #result-skin-name {
    font-size: 20px;
    letter-spacing: 4px;
    color: #d8c8f0;
    text-shadow: 0 0 12px #7a5aaa88;
    text-align: center;
    font-weight: 300;
    text-transform: uppercase;
  }
  #result-splash {
    width: 280px;
    border-radius: 6px;
    border: 2px solid #7a5aaa;
    box-shadow: 0 0 24px #7a5aaa44;
  }
  #spin-again-btn {
    background: transparent;
    border: 1px solid #7a5aaa;
    color: #7a5aaa;
    padding: 8px 28px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 3px;
    text-transform: uppercase;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    border-left: 1px solid #7a5aaa33;
    display: flex;
    flex-direction: column;
    background: #08001488;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 12px 14px;
    border-bottom: 1px solid #7a5aaa33;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .sidebar-header span {
    font-size: 10px;
    letter-spacing: 2px;
    color: #7a5aaa;
    text-transform: uppercase;
  }
  #toggle-all-btn {
    font-size: 9px;
    cursor: pointer;
    letter-spacing: 1px;
    background: none;
    border: none;
    text-transform: uppercase;
    color: #7a5aaa;
  }
  #skin-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #skin-list::-webkit-scrollbar { width: 4px; }
  #skin-list::-webkit-scrollbar-track { background: transparent; }
  #skin-list::-webkit-scrollbar-thumb { background: #7a5aaa33; border-radius: 2px; }

  .skin-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 7px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    background: #16003055;
    user-select: none;
  }
  .skin-item.active {
    border-color: #7a5aaa44;
    background: #241050aa;
    box-shadow: 0 0 5px #7a5aaa18;
  }
  .skin-item.inactive { opacity: 0.4; }

  .skin-thumb {
    width: 36px;
    height: 36px;
    border-radius: 3px;
    object-fit: cover;
    border: 1px solid #7a5aaa33;
    background: #130326;
    flex-shrink: 0;
  }
  .skin-label {
    flex: 1;
    font-size: 10px;
    color: #d8c8f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.5px;
  }
  .toggle-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #7a5aaa;
    flex-shrink: 0;
    box-shadow: 0 0 3px #7a5aaa88;
    transition: all 0.15s;
  }
  .skin-item.inactive .toggle-dot {
    background: #2e1a50;
    box-shadow: none;
  }
</style>
</head>
<body>

<header>
  <h1>YASPIN</h1>
  <p>THE UNFORGIVEN • SKIN SELECTOR</p>
</header>

<div class="app">
  <div class="wheel-panel">
    <div class="wheel-wrapper">
      <div class="wheel-pointer"></div>
      <svg id="wheel-svg" viewBox="0 0 360 360"></svg>
    </div>
    <button id="spin-btn">SPIN</button>
    <span class="no-skins-msg" id="no-skins-msg">Select at least one skin</span>

    <div id="result-card">
      <div id="result-skin-name"></div>
      <img id="result-splash" src="" alt=""/>
      <button id="spin-again-btn">SPIN AGAIN</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span>My Skins</span>
      <button id="toggle-all-btn">All / None</button>
    </div>
    <div id="skin-list"></div>
  </div>
</div>

<script>
  // JS goes here — added in Tasks 2–6
</script>

</body>
</html>
