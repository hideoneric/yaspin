<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaspin</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>
<header class="site-header">
  <div>
    <p class="eyebrow">The Unforgiven / Skin Selector</p>
    <h1>YASPIN</h1>
  </div>
  <p class="selected-summary" id="selected-summary">18 selected</p>
</header>

<main class="app" id="app">
  <section class="wheel-panel" aria-labelledby="wheel-heading">
    <div class="wheel-copy">
      <p class="eyebrow">Windblade roulette</p>
      <h2 id="wheel-heading">Choose fate, not favorites.</h2>
    </div>

    <div class="wheel-stage">
      <div class="wheel-wrapper">
        <div class="wheel-pointer" aria-hidden="true"></div>
        <svg id="wheel-svg" class="wheel-svg" viewBox="0 0 360 360" role="img" aria-label="Yasuo skin wheel"></svg>
      </div>
    </div>

    <div class="spin-controls">
      <button id="spin-btn" class="primary-action" type="button">Spin</button>
      <span class="no-skins-msg" id="no-skins-msg" role="status" aria-live="polite">Select at least one skin</span>
    </div>
  </section>

  <aside class="sidebar" aria-labelledby="skins-heading">
    <div class="sidebar-header">
      <div>
        <p class="eyebrow">Inventory</p>
        <h2 id="skins-heading">My Skins</h2>
      </div>
      <button id="toggle-all-btn" class="secondary-action" type="button">Clear all</button>
    </div>
    <div class="skin-list" id="skin-list" aria-label="Eligible Yasuo skins"></div>
  </aside>
</main>

<section id="result-card" class="result-card" role="dialog" aria-modal="true" aria-labelledby="result-skin-name" aria-describedby="result-kicker" hidden>
  <div class="result-shell">
    <p class="eyebrow" id="result-kicker">Fate picked</p>
    <h2 id="result-skin-name"></h2>
    <div class="result-image-wrap">
      <img id="result-splash" width="560" height="330" alt="">
    </div>
    <div class="result-actions">
      <button id="spin-again-btn" class="primary-action" type="button">Spin again</button>
      <button id="close-result-btn" class="secondary-action" type="button">Back</button>
    </div>
  </div>
</section>

<script src="src/config.js"></script>
<script src="src/state.js"></script>
<script src="src/sidebar.js"></script>
<script src="src/wheel.js"></script>
<script src="src/result.js"></script>
<script src="src/app.js"></script>
</body>
</html>
